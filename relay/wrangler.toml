name = "overwatch-relay"
main = "src/index.ts"
compatibility_date = "2025-04-01"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[durable_objects]
bindings = [
  { name = "USER_CHANNEL", class_name = "UserChannel" }
]

# Migration v1 created the legacy Room class.
# Migration v2 deletes Room and creates UserChannel for the overhaul.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

[[migrations]]
tag = "v2"
deleted_classes = ["Room"]
new_sqlite_classes = ["UserChannel"]
